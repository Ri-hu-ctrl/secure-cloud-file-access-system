<!DOCTYPE html>
<html>
<head>
    <title>Dashboard</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<div class="container">
    <h2>📂 Dashboard</h2>

    <form action="/upload" method="post" enctype="multipart/form-data">
        <input type="file" name="file" required>
        <button>Upload & Encrypt</button>
    </form>
<a href="/view_encrypted">
    <button>👁 View Encrypted File</button>
</a>
    <form action="/download" method="get">
        <input type="text" name="filename" placeholder="Enter filename" required>
        <button>Download & Decrypt</button>
    </form>

    <div class="nav">
        <a href="/attack">⚠️ Attack Demo</a>
    </div>
</div>

</body>
</html>
